# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions
name: Tests
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v2
    - name: Install dependencies
      run: |
        alias python=python3
        python -m pip install --upgrade pip
        pip install setuptools pylint pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        cd ..
        wget https://yoda.hepforge.org/downloads/?f=YODA-1.8.3.tar.gz -O YODA-1.8.3.tar.gz
        tar -xf YODA-1.8.3.tar.gz
        cd YODA-1.8.3
        ./configure
        make
        sudo make install
    - name: Install package
      run: |
        alias python=python3
        sudo python setup.py install
        echo $PYTHONPATH
        mcnntune --help
    - name: Test with pylint
      run: |
        alias python=python3
        pylint src -E
    - name: Download dataset
      run: |
        cd ..
        git clone --depth 1 --filter=blob:none --no-checkout https://github.com/N3PDF/mcnntunes_data/
        cd mcnntunes_data
        git checkout master -- theory_input_3params_mpipt0_2.18/training_set/
        git checkout master -- theory_input_3params_mpipt0_2.18/validation_set/
        rm theory_input_3params_mpipt0_2.18/validation_set/run022{4,5,6,7,8,9}_merged_3params.yoda
        rm theory_input_3params_mpipt0_2.18/validation_set/run023*_merged_3params.yoda
        rm theory_input_3params_mpipt0_2.18/validation_set/run024*_merged_3params.yoda
    - name: Test with pytest
      run: |
        alias python=python3
        echo $PYTHONPATH
        pytest examples
